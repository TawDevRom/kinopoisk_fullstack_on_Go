    <!-- Ранняя инициализация WebApp: тема, expand, запрет свайпа вниз -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var webApp = window.Telegram && window.Telegram.WebApp;
        if (!webApp) return;

        try {
          // говорим Телеге, что всё готово, и разворачиваем мини-апп
          if (typeof webApp.ready === "function") {
            webApp.ready();
          }
          if (typeof webApp.expand === "function") {
            webApp.expand();
          }

          // вырубаем сворачивание мини-аппа вертикальным свайпом по контенту
          if (typeof webApp.disableVerticalSwipes === "function") {
            webApp.disableVerticalSwipes();
          }

          // подхватываем цвет фона из темы (на всякий)
          var tp = webApp.themeParams || {};
          if (tp.bg_color) {
            document.documentElement.style.setProperty("--tg-bg", tp.bg_color);
          }
        } catch (e) {
          console.log("[Flexora] Telegram WebApp init error", e);
        }
      });
    </script>
